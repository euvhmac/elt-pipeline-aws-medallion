# =====================================================
# dbt project - skeleton (Sprint 1)
# Modelos seraco preenchidos na Sprint 4
# =====================================================

name: 'elt_pipeline'
version: '0.1.0'
config-version: 2

profile: 'elt_pipeline'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  tenants: ['unit_01', 'unit_02', 'unit_03', 'unit_04', 'unit_05']

models:
  elt_pipeline:
    +materialized: view
    silver:
      +schema: silver_dev
      +materialized: incremental
      +incremental_strategy: merge
      +table_type: iceberg
      +on_schema_change: append_new_columns
      +partitioned_by: ['tenant_id']
    gold:
      +schema: gold_dev
      +materialized: table
      +table_type: iceberg
      +partitioned_by: ['tenant_id']
    platinum:
      +schema: platinum_dev
      +materialized: view

seeds:
  elt_pipeline:
    +schema: gold_dev
