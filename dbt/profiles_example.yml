# =====================================================
# dbt profiles - TEMPLATE (Sprint 1)
# Copie para ~/.dbt/profiles.yml e ajuste valores via env vars.
# NUNCA commitar profiles.yml com credenciais reais.
# =====================================================

elt_pipeline:
  target: dev
  outputs:
    dev:
      type: athena
      s3_staging_dir: "s3://{{ env_var('S3_BUCKET_ATHENA_RESULTS') }}/staging/"
      s3_data_dir: "s3://{{ env_var('S3_BUCKET_GOLD') }}/"
      region_name: "{{ env_var('AWS_REGION', 'us-east-1') }}"
      database: awsdatacatalog
      schema: gold
      work_group: "{{ env_var('ATHENA_WORKGROUP', 'elt-pipeline-dev') }}"
      threads: 4
      aws_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
      aws_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"

    prd:
      type: athena
      s3_staging_dir: "s3://elt-pipeline-athena-results-prd/staging/"
      s3_data_dir: "s3://elt-pipeline-gold-prd/"
      region_name: us-east-1
      database: awsdatacatalog
      schema: gold
      work_group: elt-pipeline-prd
      threads: 8
      # Em prd, usar IAM role attach (nao keys)
