version: 2

models:
  - name: silver_dw_clientes
    description: "Limpeza + padronizacao do cadastro de clientes."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: cliente_id
        tests: [not_null]
      - name: nm_cliente
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, cliente_id]

  - name: silver_dw_vendedores
    description: "Cadastro de vendedores limpo."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: vendedor_id
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, vendedor_id]

  - name: silver_dw_produtos
    description: "Catalogo de produtos limpo."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: produto_id
        tests: [not_null]
      - name: vlr_preco_unitario
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, produto_id]

  - name: silver_dw_vendas
    description: "Cabecalho de vendas limpo."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: venda_id
        tests: [not_null]
      - name: dt_venda
        tests: [not_null]
      - name: cliente_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_clientes')
              field: cliente_id
      - name: ds_status
        tests:
          - accepted_values:
              values: ['FATURADA', 'CANCELADA', 'PENDENTE']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, venda_id]

  - name: silver_dw_itens_pedido
    description: "Itens de pedido normalizados."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: item_id
        tests: [not_null]
      - name: venda_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_vendas')
              field: venda_id
      - name: produto_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_produtos')
              field: produto_id
      - name: qtd_vendida
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, item_id]

  - name: silver_dw_fornecedores
    description: "Cadastro de fornecedores limpo. Sem updated_at no Bronze — lookback por created_at."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: fornecedor_id
        tests: [not_null]
      - name: nm_fornecedor
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, fornecedor_id]

  - name: silver_dw_ordens_compra
    description: "Ordens de compra limpas com FK para fornecedores."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: ordem_compra_id
        tests: [not_null]
      - name: vlr_total
        tests: [not_null]
      - name: fornecedor_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_fornecedores')
              field: fornecedor_id
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, ordem_compra_id]

  - name: silver_dw_empresas
    description: "Cadastro de empresas limpo. Sem updated_at no Bronze — lookback por created_at."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: empresa_id
        tests: [not_null]
      - name: nm_empresa
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, empresa_id]

  - name: silver_dw_departamentos
    description: "Cadastro de departamentos limpo. Sem updated_at no Bronze — lookback por created_at."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: departamento_id
        tests: [not_null]
      - name: nm_departamento
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, departamento_id]

  - name: silver_dw_funcionarios
    description: "Cadastro de funcionarios limpo. Sem updated_at no Bronze — lookback por created_at. FK departamento_id."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: funcionario_id
        tests: [not_null]
      - name: nm_funcionario
        tests: [not_null]
      - name: departamento_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_departamentos')
              field: departamento_id
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, funcionario_id]

  - name: silver_dw_materias_primas
    description: "Cadastro de materias-primas limpo. Sem updated_at no Bronze — lookback por created_at."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: materia_prima_id
        tests: [not_null]
      - name: nm_materia_prima
        tests: [not_null]
      - name: vlr_preco_unitario
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, materia_prima_id]

  - name: silver_dw_ordens_producao
    description: "Ordens de producao limpas. Sem updated_at no Bronze — lookback por created_at. FK produto_id."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: ordem_producao_id
        tests: [not_null]
      - name: produto_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_produtos')
              field: produto_id
      - name: qt_produzida
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, ordem_producao_id]

  - name: silver_dw_filiais
    description: "Cadastro de filiais limpo. Sem updated_at no Bronze — lookback por created_at."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: filial_id
        tests: [not_null]
      - name: nm_filial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, filial_id]

  - name: silver_dw_transportadoras
    description: "Cadastro de transportadoras limpo. Sem updated_at no Bronze — lookback por created_at."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: transportadora_id
        tests: [not_null]
      - name: nm_transportadora
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, transportadora_id]

  - name: silver_dw_expedicao
    description: "Registros de expedicao limpos. Com updated_at — lookback por updated_at. FKs: transportadora_id, venda_id."
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: expedicao_id
        tests: [not_null]
      - name: venda_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_vendas')
              field: venda_id
      - name: transportadora_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dw_transportadoras')
              field: transportadora_id
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tenant_id, expedicao_id]
