    columns:
      - name: sk_grupo
        description: "Chave primária única (surrogate key) do grupo do produto."
        tests:
          - unique
          - not_null

  - name: silver_dw_linha
    description: "Dimensão de linhas para classificação de produtos."
    columns:
      - name: sk_linha
        description: "Chave primária única (surrogate key) da linha do produto."
        tests:
          - unique
          - not_null

  - name: silver_dw_marca_item
    description: "Dimensão de marcas para classificação de produtos."
    columns:
      - name: sk_marca_item
        description: "Chave primária única (surrogate key) da marca do produto."
        tests:
          - unique
          - not_null

  - name: silver_dw_origem
    description: "Dimensão de origens para classificação de produtos."
    columns:
      - name: sk_origem
