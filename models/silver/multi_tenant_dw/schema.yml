  - name: silver_dw_condpag
    description: "Tabela unificada de condições de pagamento das empresas Unit_01, Unit_02, Unit_04, Unit_03 Unit_05. A coluna 'empresa' identifica a origem dos dados."
    columns:
      - name: sk_condicao_pagamento
        description: "Identificador único da condição de pagamento."
        tests:
          - not_null
