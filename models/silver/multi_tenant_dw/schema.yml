  - name: silver_dw_tipoitem
    description: "Dimensão de tipos para classificação de produtos."
    columns:
      - name: sk_tipo_item
        description: "Chave primária única (surrogate key) do tipo do produto."
        tests:
          - unique
          - not_null

  - name: silver_dw_item
    description: "Tabela central de produtos, unificada e limpa, com as chaves para todas as suas dimensões."
    columns:
      - name: sk_item
        description: "Chave primária única (surrogate key) do item."
        tests:
          - unique
          - not_null

  - name: silver_dw_devolucao
    description: "Tabela unificada de devoluções das empresas Unit_01, Unit_02, Unit_04, Unit_03 Unit_05. A coluna 'empresa' identifica a origem dos dados."
    columns:
      - name: sk_devolucao_item
        description: "Identificador único da devolução."
        tests:
          - not_null
          - unique

  - name: silver_dw_vendas
    description: "Tabela unificada de vendas das empresas Unit_01, Unit_02, Unit_04, Unit_03 Unit_05. A coluna 'empresa' identifica a origem dos dados."
    columns:
      - name: sk_venda_item
        description: "Identificador único da venda."
