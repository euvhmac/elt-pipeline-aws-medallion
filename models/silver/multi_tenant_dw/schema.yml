  - name: silver_dw_filial
    description: "Tabela unificada de filiais das empresas Unit_01, Unit_02, Unit_04, Unit_03 Unit_05. A coluna 'empresa' identifica a origem dos dados."
    columns:
      - name: sk_filial
        description: "Identificador único da filial."
        tests:
